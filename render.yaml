services:
  - type: web
    name: vetclaim-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      # AI / voice providers — set these in the Render dashboard
      - key: GOOGLE_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: VAPI_PRIVATE_KEY
        sync: false
      # VA developer portal (sandbox)
      - key: VA_API_KEY
        sync: false
      - key: VA_FORMS_API_KEY
        sync: false
